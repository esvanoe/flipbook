version: '3.8'

services:
  # Caddy reverse proxy with automatic TLS
  caddy:
    image: caddy:2-alpine
    container_name: bitm-ng-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - bitm-network
    depends_on:
      - app

  # Application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bitm-ng-app
    expose:
      - "58082"
    environment:
      - SERVER_PORT=58082
      - SERVER_HOST=0.0.0.0
      - ADMIN_ALLOWED_IPS=${ADMIN_ALLOWED_IPS:-127.0.0.1}
      - ADMIN_SOCKET_KEY=${ADMIN_SOCKET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - BROWSER_MAX_INSTANCES=${BROWSER_MAX_INSTANCES:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - ../user_data:/app/user_data
      - ../config:/app/config:ro
      - ../logs:/app/logs
    restart: unless-stopped
    shm_size: '2gb'
    privileged: false
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    networks:
      - bitm-network

networks:
  bitm-network:
    driver: bridge

volumes:
  caddy_data:
    # Persistent storage for Let's Encrypt certificates
  caddy_config:
    # Caddy configuration storage

